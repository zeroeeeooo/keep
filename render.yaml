services:
  # ---- Express 后端 ----
  - type: web
    name: keepro-api
    runtime: node
    repo: https://github.com/你的用户名/keep   # 部署时改成你的仓库地址
    branch: main
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true                   # Render 自动生成随机密钥
      - key: DB_HOST
        sync: false                           # 手动在 Dashboard 填写
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: wyzwjf
      - key: CLIENT_ORIGIN
        value: https://你的前端域名.vercel.app

  # ---- 前端静态站点 ----
  # 如果你想把前端也部署到 Render，取消下面注释
